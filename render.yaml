services:
  - type: web
    name: biggclaw
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install "vulnclaw[web]"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ADMIN_EMAIL
        value: manuelfosu360@gmail.com
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TOKEN_TTL
        value: "43200"
      - key: VULNCLAW_BIN
        value: vulnclaw
      - key: VULNCLAW_PROVIDER
        value: deepseek
      - key: VULNCLAW_LLM_MODEL
        value: deepseek-v4-pro
      - key: VULNCLAW_LLM_API_KEY
        sync: false
      - key: VULNCLAW_LLM_BASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
